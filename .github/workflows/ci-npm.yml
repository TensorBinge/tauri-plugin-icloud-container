name: CI NPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  npm:
    name: npm / ${{ matrix.os }} / node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Test guest API contract
        run: node ./tests/guest_api_contract.mjs

      - name: Pack artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Upload npm artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: artifacts/*.tgz
